<!DOCTYPE html>
<html lang="lo">
<head>

<title>RJ OUTLET</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #FAFAFA;
    color: #333;
}

/* ສ່ວນ Header */
header {
    background: linear-gradient(135deg, #FFD700, #D4AF37);
    color: #000;
    text-align: center;
    padding: 25px 15px;
}

/* ຕົບແຕ່ງໂລໂກ້ໃຫ້ເປັນວົງມົນ */
.logo {
    width: 110px;
    height: 110px;
    border-radius: 50%; /* ເຮັດເປັນຮູບວົງມົນ */
    border: 3px solid #FFF;
    object-fit: cover;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    margin-bottom: 10px;
}

header h1 {
    margin: 5px 0;
    font-size: 26px;
    color: #000;
}

header p {
    margin: 0;
    font-size: 14px;
    opacity: 0.8;
}

.container {
    padding: 15px;
}

.card {
    background: #FFF;
    margin-bottom: 20px;
    padding: 20px;
    border-radius: 18px;
    border: 2px solid #D4AF37;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    text-align: center;
}

/* ປຸ່ມຫຼັກ */
.main-btn {
    background: linear-gradient(135deg, #FFD700, #D4AF37);
    color: #000;
    border: none;
    padding: 15px 25px;
    border-radius: 12px;
    font-size: 18px;
    font-weight: bold;
    width: 100%;
    margin: 10px 0;
    cursor: pointer;
}

/* ໝວດໝູ່ສິນຄ້າ */
.category-menu {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.cat-btn {
    background: #f0f0f0;
    border: 1px solid #ccc;
    padding: 8px 16px;
    border-radius: 20px;
    font-weight: bold;
    cursor: pointer;
}

.cat-btn.active {
    background: #D4AF37;
    color: #fff;
    border-color: #D4AF37;
}

/* ຕາຕະລາງສິນຄ້າ */
.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 15px;
}

.product-item {
    background: #fff;
    border: 1px solid #eee;
    border-radius: 12px;
    padding: 10px;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

.product-item img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 8px;
}

.price {
    color: #d63384;
    font-weight: bold;
    margin: 5px 0;
}

.buy-btn {
    background: #25D366;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 8px;
    font-weight: bold;
    width: 100%;
    cursor: pointer;
}

a { text-decoration: none; }
.hidden { display: none !important; }
</style>
</head>
